<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리 앱</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-sub: #6b7280;
      --text-muted: #adb5bd;
      --input-bg: #ffffff;
      --work: #4A90D9;
      --personal: #E67E22;
      --study: #27AE60;
      --done-color: #2ECC71;
      --delete-color: #E74C3C;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --input-bg: #1e293b;
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .container { max-width: 620px; margin: 0 auto; }

    /* ── 헤더 ── */
    header { margin-bottom: 20px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
    .date-line { margin-top: 3px; color: var(--text-sub); font-size: 0.875rem; }

    /* 다크모드 토글 */
    .theme-wrap { display: flex; align-items: center; gap: 6px; }
    .switch-icon { font-size: 1rem; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--border); border-radius: 99px; transition: background 0.3s ease;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .switch input:checked + .slider { background: var(--work); }
    .switch input:checked + .slider::before { transform: translateX(20px); }

    /* ── 카드 ── */
    .card {
      background: var(--card);
      border-radius: 14px; padding: 16px;
      box-shadow: var(--shadow); margin-bottom: 12px;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* ── 대시보드 ── */
    .dashboard { padding: 18px 20px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .dash-title { font-size: 0.95rem; font-weight: 700; }
    .dash-today {
      font-size: 0.8rem; color: var(--text-sub);
      background: var(--bg); padding: 3px 10px; border-radius: 99px;
      transition: background-color 0.3s ease;
    }
    .dash-today strong { color: var(--work); font-weight: 700; }
    .dash-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .dash-row:last-child { margin-bottom: 0; }
    .dash-row-label { font-size: 0.82rem; color: var(--text-sub); min-width: 58px; white-space: nowrap; }
    .progress-bar-wrap {
      flex: 1; background: var(--border); border-radius: 99px; height: 10px; overflow: hidden;
      transition: background-color 0.3s ease;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #27AE60, #2ECC71);
      border-radius: 99px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .mini-bar-wrap {
      flex: 1; background: var(--border); border-radius: 99px; height: 7px; overflow: hidden;
      transition: background-color 0.3s ease;
    }
    .mini-bar-fill { height: 100%; border-radius: 99px; transition: width 0.45s cubic-bezier(0.4,0,0.2,1); }
    .mini-bar-fill.work     { background: var(--work); }
    .mini-bar-fill.personal { background: var(--personal); }
    .mini-bar-fill.study    { background: var(--study); }
    .dash-stat { font-size: 0.8rem; color: var(--text-sub); min-width: 86px; text-align: right; white-space: nowrap; }
    .dash-stat strong { color: var(--text); font-weight: 600; }
    .dash-divider { height: 1px; background: var(--bg); margin: 12px 0; transition: background-color 0.3s ease; }

    /* ── 그룹 바 ── */
    .groups-card { padding: 12px 16px; }
    .groups-label { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; letter-spacing: 0.3px; margin-bottom: 8px; }
    .groups-bar { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .groups-bar::-webkit-scrollbar { display: none; }
    .group-pill {
      flex-shrink: 0; display: flex; align-items: center; gap: 4px;
      padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 99px;
      background: var(--card); color: var(--text-sub);
      font-size: 0.82rem; cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
    }
    .group-pill:hover { border-color: var(--work); color: var(--work); }
    .group-pill.active { background: var(--work); border-color: var(--work); color: #fff; font-weight: 600; }
    .pill-del {
      font-size: 0.85rem; background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 0 0 0 2px; line-height: 1; transition: color 0.15s;
    }
    .group-pill.active .pill-del { color: rgba(255,255,255,0.65); }
    .group-pill.active .pill-del:hover { color: #fff; }
    .pill-del:hover { color: var(--delete-color); }
    .group-add-btn {
      flex-shrink: 0; padding: 5px 12px;
      border: 1.5px dashed var(--border); border-radius: 99px;
      background: transparent; color: var(--text-sub); font-size: 0.82rem;
      cursor: pointer; transition: all 0.15s;
    }
    .group-add-btn:hover { border-color: var(--work); color: var(--work); }
    .group-new-input {
      flex-shrink: 0; padding: 4px 10px;
      border: 1.5px solid var(--work); border-radius: 99px;
      font-size: 0.82rem; background: var(--input-bg); color: var(--text);
      outline: none; width: 120px;
    }

    /* ── 추가 폼 ── */
    .add-form { display: flex; gap: 8px; flex-wrap: wrap; }
    .add-form input[type="text"] {
      flex: 1; min-width: 160px; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem;
      background: var(--input-bg); color: var(--text); outline: none;
      transition: border-color 0.15s, background-color 0.3s ease, color 0.3s ease;
    }
    .add-form input[type="text"]:focus { border-color: var(--work); }
    .add-form input[type="text"]::placeholder { color: var(--text-muted); }
    .add-form select {
      padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem;
      background: var(--input-bg); color: var(--text); cursor: pointer; outline: none;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .add-form button {
      padding: 10px 20px; background: var(--work); color: #fff; border: none;
      border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap;
    }
    .add-form button:hover  { background: #3a7bc8; }
    .add-form button:active { transform: scale(0.97); }

    /* ── 검색 + 탭 ── */
    .filter-card { padding: 12px 16px; }
    .search-wrap { margin-bottom: 10px; position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.85rem; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 8px 14px 8px 34px;
      border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem;
      background: var(--input-bg); color: var(--text); outline: none;
      transition: border-color 0.15s, background-color 0.3s ease, color 0.3s ease;
    }
    .search-input:focus { border-color: var(--work); }
    .search-input::placeholder { color: var(--text-muted); }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab-btn {
      padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 99px;
      background: var(--card); font-size: 0.85rem; cursor: pointer;
      color: var(--text-sub); display: flex; align-items: center; gap: 5px;
      transition: all 0.15s;
    }
    .tab-btn .badge {
      background: var(--bg); color: var(--text-sub); border-radius: 99px;
      padding: 1px 7px; font-size: 0.75rem; font-weight: 600;
      transition: background-color 0.3s ease;
    }
    .tab-btn.active { border-color: transparent; color: #fff; font-weight: 600; }
    .tab-btn.active .badge { background: rgba(255,255,255,0.3); color: #fff; }
    .tab-btn[data-cat="all"].active      { background: var(--work); }
    .tab-btn[data-cat="work"].active     { background: var(--work); }
    .tab-btn[data-cat="personal"].active { background: var(--personal); }
    .tab-btn[data-cat="study"].active    { background: var(--study); }

    /* ── 액션 바 ── */
    .actions-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px; margin-bottom: 8px;
    }
    .remaining-count { font-size: 0.82rem; color: var(--text-sub); }
    .remaining-count strong { color: var(--work); }
    .clear-btn {
      font-size: 0.8rem; color: var(--delete-color);
      background: none; border: 1.5px solid var(--delete-color);
      border-radius: 6px; padding: 4px 10px; cursor: pointer;
      transition: all 0.15s; opacity: 0.7;
    }
    .clear-btn:hover { opacity: 1; background: var(--delete-color); color: #fff; }
    .clear-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* ── 할 일 목록 ── */
    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    @keyframes fadeIn  {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(14px); }
    }

    .todo-item {
      background: var(--card); border-radius: 10px; padding: 12px 14px;
      box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 0;
      animation: fadeIn 0.22s ease;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }
    .todo-item.removing { animation: fadeOut 0.22s ease forwards; pointer-events: none; }
    .todo-item.done { opacity: 0.52; }
    .todo-row { display: flex; align-items: center; gap: 10px; }

    /* ── 메모 ── */
    .memo-btn {
      flex-shrink: 0; background: none;
      border: 1.5px solid var(--border); border-radius: 6px;
      color: var(--text-muted); font-size: 0.72rem; font-weight: 600;
      padding: 3px 9px; cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
    }
    .memo-btn:hover    { border-color: var(--work); color: var(--work); }
    .memo-btn.has-memo { border-color: var(--work); color: var(--work); }
    .memo-btn.memo-open { background: var(--work); border-color: var(--work); color: #fff; }
    .memo-panel {
      display: none; gap: 6px; align-items: flex-start;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .memo-panel.open { display: flex; }
    .memo-textarea {
      flex: 1; resize: none; min-height: 72px; padding: 8px 10px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; font-family: inherit; line-height: 1.5;
      background: var(--input-bg); color: var(--text); outline: none;
      transition: border-color 0.15s, background-color 0.3s ease;
    }
    .memo-textarea:focus { border-color: var(--work); }
    .memo-textarea::placeholder { color: var(--text-muted); }
    .memo-close-btn {
      flex-shrink: 0; background: none; border: none; color: var(--text-muted);
      font-size: 1.1rem; cursor: pointer; padding: 2px 4px;
      border-radius: 4px; line-height: 1; transition: color 0.15s;
    }
    .memo-close-btn:hover { color: var(--delete-color); }

    /* ── 휴지통 ── */
    .trash-toggle-btn {
      font-size: 0.8rem; color: var(--text-sub);
      background: none; border: 1.5px solid var(--border);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all 0.15s;
    }
    .trash-toggle-btn.has-items { border-color: var(--personal); color: var(--personal); }
    .trash-toggle-btn.open { background: var(--personal); border-color: var(--personal); color: #fff; }
    .trash-panel {
      background: var(--card); border-radius: 14px; margin-bottom: 12px;
      box-shadow: var(--shadow); border: 1.5px solid var(--personal);
      overflow: hidden; transition: background-color 0.3s ease;
    }
    .trash-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .trash-panel-title { font-size: 0.9rem; font-weight: 700; color: var(--personal); }
    .trash-empty-all-btn {
      font-size: 0.75rem; color: var(--delete-color); background: none;
      border: 1px solid var(--delete-color); border-radius: 5px;
      padding: 3px 8px; cursor: pointer; transition: all 0.15s;
    }
    .trash-empty-all-btn:hover { background: var(--delete-color); color: #fff; }
    .trash-list { list-style: none; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
    .trash-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: var(--bg); border-radius: 8px;
      transition: background-color 0.3s ease;
    }
    .trash-item-text {
      flex: 1; font-size: 0.88rem; color: var(--text-sub); text-decoration: line-through;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .trash-item-time { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .restore-btn {
      flex-shrink: 0; background: none; border: 1.5px solid var(--done-color);
      color: var(--done-color); border-radius: 6px; font-size: 0.72rem; font-weight: 600;
      padding: 2px 8px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .restore-btn:hover { background: var(--done-color); color: #fff; }
    .perm-del-btn {
      flex-shrink: 0; background: none; border: none; color: var(--border);
      font-size: 1.1rem; cursor: pointer; padding: 2px 4px;
      border-radius: 4px; line-height: 1; transition: color 0.15s;
    }
    .perm-del-btn:hover { color: var(--delete-color); }
    .trash-empty-msg { text-align: center; padding: 20px; color: var(--text-sub); font-size: 0.88rem; }

    /* ── 정렬 바 ── */
    .sort-bar { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .sort-label { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; }
    .sort-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .sort-btn {
      padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 99px;
      background: var(--card); font-size: 0.75rem; cursor: pointer;
      color: var(--text-sub); transition: all 0.15s; white-space: nowrap;
    }
    .sort-btn:hover  { border-color: var(--work); color: var(--work); }
    .sort-btn.active { background: var(--work); border-color: var(--work); color: #fff; font-weight: 600; }

    /* ── 데이터 내보내기/가져오기 ── */
    .data-bar { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
    .data-btn {
      font-size: 0.8rem; padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--card); color: var(--text-sub); cursor: pointer; transition: all 0.15s;
    }
    .data-btn:hover { border-color: var(--work); color: var(--work); }

    /* ── 드래그 앤 드롭 ── */
    .sortable-ghost { opacity: 0.3; }
    .sort-handle {
      display: none; cursor: grab; color: var(--text-muted); font-size: 1rem;
      padding: 2px 2px; flex-shrink: 0; user-select: none;
    }
    .sort-handle:active { cursor: grabbing; }
    .todo-list.manual-sort .sort-handle { display: block; }
    .todo-item.dragging { opacity: 0.45; }
    .cal-todo-item[draggable="true"] { cursor: grab; }
    .cal-todo-item[draggable="true"]:active { cursor: grabbing; }
    .cal-todo-item.dragging { opacity: 0.45; }

    /* ── 달력 ── */
    .calendar-card { padding: 16px 20px; margin-top: 12px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-title { font-size: 1rem; font-weight: 700; }
    .cal-nav {
      background: none; border: 1.5px solid var(--border); border-radius: 6px;
      padding: 4px 10px; cursor: pointer; color: var(--text-sub);
      font-size: 0.85rem; transition: all 0.15s;
    }
    .cal-nav:hover { border-color: var(--work); color: var(--work); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dow {
      text-align: center; font-size: 0.7rem; font-weight: 700;
      color: var(--text-muted); padding: 4px 0;
    }
    .cal-dow:first-child { color: #e74c3c; }
    .cal-dow:last-child  { color: var(--work); }
    .cal-day {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 5px 2px; border-radius: 8px; cursor: pointer;
      min-height: 46px; transition: background 0.15s;
    }
    .cal-day:hover:not(.empty) { background: var(--bg); }
    .cal-day.empty { cursor: default; }
    .cal-day-num {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 500; color: var(--text);
    }
    .cal-day.today .cal-day-num { background: var(--work); color: #fff; font-weight: 700; }
    .cal-day.selected:not(.today) .cal-day-num { background: var(--bg); border: 2px solid var(--work); }
    .cal-day.sun .cal-day-num { color: #e74c3c; }
    .cal-day.sat .cal-day-num { color: var(--work); }
    .cal-day.today.sun .cal-day-num,
    .cal-day.today.sat .cal-day-num { color: #fff; }
    .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 36px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .cal-dot.work     { background: var(--work); }
    .cal-dot.personal { background: var(--personal); }
    .cal-dot.study    { background: var(--study); }
    .cal-day.drop-target { background: rgba(74,144,217,0.15); outline: 2px dashed var(--work); }
    .cal-selected-panel { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .cal-selected-title { font-size: 0.85rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
    .cal-todo-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .cal-todo-item:last-child { border-bottom: none; }
    .cal-todo-done-text { text-decoration: line-through; opacity: 0.55; }
    .cal-empty-day { text-align: center; padding: 14px 0; color: var(--text-muted); font-size: 0.85rem; }
    .due-date-badge {
      font-size: 0.7rem; color: var(--work); background: rgba(74,144,217,0.12);
      border-radius: 4px; padding: 1px 5px; white-space: nowrap;
    }
    .due-date-badge.overdue { color: var(--delete-color); background: rgba(231,76,60,0.1); }

    .todo-check {
      flex-shrink: 0; width: 22px; height: 22px;
      border: 2px solid var(--border); border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      background: var(--input-bg); transition: all 0.15s;
    }
    .todo-check:hover { border-color: var(--done-color); }
    .todo-item.done .todo-check { background: var(--done-color); border-color: var(--done-color); }
    .todo-check svg { display: none; }
    .todo-item.done .todo-check svg { display: block; }

    .cat-badge { flex-shrink: 0; font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; color: #fff; }
    .cat-badge.work     { background: var(--work); }
    .cat-badge.personal { background: var(--personal); }
    .cat-badge.study    { background: var(--study); }

    .todo-content { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .todo-text { font-size: 0.95rem; line-height: 1.4; cursor: text; word-break: break-word; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-sub); }
    .todo-time { font-size: 0.75rem; color: var(--text-muted); }

    .todo-edit-input {
      width: 100%; font-size: 0.95rem; padding: 3px 8px;
      border: 1.5px solid var(--work); border-radius: 6px; outline: none;
      background: var(--input-bg); color: var(--text);
    }
    .todo-edit-select {
      margin-top: 4px; font-size: 0.82rem; padding: 3px 8px; align-self: flex-start;
      border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--input-bg); color: var(--text); cursor: pointer; outline: none;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .todo-edit-select:focus { border-color: var(--work); }

    .todo-delete {
      flex-shrink: 0; background: none; border: none; color: var(--border);
      font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 2px 4px;
      border-radius: 4px; transition: color 0.15s;
    }
    .todo-delete:hover { color: var(--delete-color); }

    /* ── 빈 상태 ── */
    .empty-state { text-align: center; padding: 40px 0; color: var(--text-sub); font-size: 0.9rem; }
    .empty-icon  { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* ── 단축키 힌트 ── */
    .shortcut-hint { text-align: center; font-size: 0.72rem; color: var(--text-muted); margin-top: 14px; }
    .shortcut-hint kbd {
      background: var(--card); border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 5px; font-family: monospace; font-size: 0.7rem;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    /* ── 날짜 입력 ── */
    .add-form input[type="date"] {
      padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; background: var(--input-bg); color: var(--text);
      cursor: pointer; outline: none;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .add-form input[type="date"]:focus { border-color: var(--work); }

    /* ── 오늘 마감 강조 ── */
    .todo-item.due-today { border: 2px solid var(--work); background: rgba(74,144,217,0.06); }
    body.dark .todo-item.due-today { background: rgba(74,144,217,0.12); }
    .due-today-badge {
      font-size: 0.68rem; font-weight: 700; color: #fff;
      background: var(--work); border-radius: 4px;
      padding: 1px 6px; white-space: nowrap; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div>
        <h1>📋 할 일 관리</h1>
        <p class="date-line" id="date-display"></p>
      </div>
      <div class="theme-wrap">
        <span class="switch-icon">☀️</span>
        <label class="switch" title="다크/라이트 모드">
          <input type="checkbox" id="theme-toggle">
          <span class="slider"></span>
        </label>
        <span class="switch-icon">🌙</span>
      </div>
    </div>
  </header>

  <!-- 대시보드 -->
  <div class="card dashboard">
    <div class="dash-header">
      <span class="dash-title">📊 진행률 대시보드</span>
      <span class="dash-today">오늘 추가 <strong id="today-count">0</strong>개</span>
    </div>
    <div class="dash-row">
      <span class="dash-row-label">전체</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="dash-stat" id="overall-stat"><strong>0/0</strong> 완료 (0%)</span>
    </div>
    <div class="dash-divider"></div>
    <div class="dash-row">
      <span class="dash-row-label">💼 업무</span>
      <div class="mini-bar-wrap"><div class="mini-bar-fill work"     id="bar-work"     style="width:0%"></div></div>
      <span class="dash-stat" id="stat-work"><strong>0/0</strong></span>
    </div>
    <div class="dash-row">
      <span class="dash-row-label">🏠 개인</span>
      <div class="mini-bar-wrap"><div class="mini-bar-fill personal" id="bar-personal" style="width:0%"></div></div>
      <span class="dash-stat" id="stat-personal"><strong>0/0</strong></span>
    </div>
    <div class="dash-row">
      <span class="dash-row-label">📚 공부</span>
      <div class="mini-bar-wrap"><div class="mini-bar-fill study"    id="bar-study"    style="width:0%"></div></div>
      <span class="dash-stat" id="stat-study"><strong>0/0</strong></span>
    </div>
  </div>

  <!-- 그룹(대항목) -->
  <div class="card groups-card">
    <div class="groups-label">📁 그룹</div>
    <div class="groups-bar" id="groups-bar"></div>
  </div>

  <!-- 추가 폼 -->
  <div class="card">
    <div class="add-form">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요... (Alt+N)" maxlength="100">
      <select id="cat-select">
        <option value="work">💼 업무</option>
        <option value="personal">🏠 개인</option>
        <option value="study">📚 공부</option>
      </select>
      <input type="date" id="date-input" title="날짜 선택 (선택사항)">
      <button id="add-btn">추가</button>
    </div>
  </div>

  <!-- 검색 + 카테고리 탭 -->
  <div class="card filter-card">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="할 일 검색...">
    </div>
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-cat="all">전체 <span class="badge" id="badge-all">0</span></button>
      <button class="tab-btn" data-cat="work">💼 업무 <span class="badge" id="badge-work">0</span></button>
      <button class="tab-btn" data-cat="personal">🏠 개인 <span class="badge" id="badge-personal">0</span></button>
      <button class="tab-btn" data-cat="study">📚 공부 <span class="badge" id="badge-study">0</span></button>
    </div>
    <div class="sort-bar">
      <span class="sort-label">정렬</span>
      <div class="sort-btns" id="sort-btns">
        <button class="sort-btn active" data-sort="createdAt-desc">최신순</button>
        <button class="sort-btn" data-sort="createdAt-asc">오래된순</button>
        <button class="sort-btn" data-sort="category">카테고리</button>
        <button class="sort-btn" data-sort="done">완료순</button>
        <button class="sort-btn" data-sort="manual">⠿ 수동</button>
      </div>
    </div>
  </div>

  <!-- 액션 바 -->
  <div class="actions-bar">
    <span class="remaining-count" id="remaining-count">남은 할 일 <strong>0</strong>개</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="trash-btn" class="trash-toggle-btn">🗑️ <span id="trash-badge">0</span></button>
      <button id="clear-btn" class="clear-btn" disabled>완료 항목 삭제</button>
    </div>
  </div>

  <!-- 휴지통 패널 -->
  <div id="trash-panel" class="trash-panel" style="display:none"></div>

  <!-- 목록 -->
  <ul class="todo-list" id="todo-list"></ul>

  <div class="data-bar">
    <button id="export-btn" class="data-btn">📤 JSON 내보내기</button>
    <label class="data-btn" for="import-file">📥 JSON 가져오기</label>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>

  <p class="shortcut-hint">
    <kbd>Alt+N</kbd> 새 할 일 &nbsp;|&nbsp;
    <kbd>Alt+1~4</kbd> 카테고리 전환 &nbsp;|&nbsp;
    텍스트 더블클릭으로 수정
  </p>

  <!-- 달력 -->
  <div class="card calendar-card">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">◀</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav" id="cal-next">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-selected-panel" id="cal-panel" style="display:none"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getFirestore, collection, doc, setDoc, updateDoc, deleteDoc,
    onSnapshot, writeBatch, getDocs
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ── Firebase 초기화 ───────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyAtw0zmAdFlVnUvRNOFfUzgPosGfnV3veE",
    authDomain: "todo-app-5b47e.firebaseapp.com",
    projectId: "todo-app-5b47e",
    storageBucket: "todo-app-5b47e.firebasestorage.app",
    messagingSenderId: "667888863279",
    appId: "1:667888863279:web:8f68bbc65e76ea1f229eda"
  };
  const fbApp  = initializeApp(firebaseConfig);
  const db     = getFirestore(fbApp);
  const todosCol  = collection(db, 'todos');
  const groupsCol = collection(db, 'groups');

  // ── 상수 & 상태 ──────────────────────────────────────
  const KEY_THEME  = 'todo-app-theme';

  let todos        = [];
  let groups       = [];
  let currentGroup = 'default';
  let currentCat   = 'all';
  let searchQuery  = '';
  let isEditing    = false;
  let openMemoId    = null;
  let memoSaveTimer = null;
  let showTrash     = false;
  let renderTimer   = null;
  let sortableInst  = null;

  const SORT_KEY  = 'todo-app-sort';
  const ORDER_KEY = 'todo-app-order';
  let currentSort = localStorage.getItem(SORT_KEY) || 'createdAt-desc';
  let manualOrder = JSON.parse(localStorage.getItem(ORDER_KEY) || '[]');

  // 달력 상태
  const todayYMD = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  let calYear         = new Date().getFullYear();
  let calMonth        = new Date().getMonth();
  let selectedCalDate = null;
  let draggedTodoId   = null;

  // 정렬 버튼 초기 상태
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === currentSort)
  );

  const CAT_LABEL     = { work: '업무', personal: '개인', study: '공부' };
  const DEFAULT_GROUP = { id: 'default', name: '기본' };

  // ── 테마 (localStorage 유지) ──────────────────────────
  if (localStorage.getItem(KEY_THEME) === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-toggle').checked = true;
  }
  document.getElementById('theme-toggle').addEventListener('change', e => {
    document.body.classList.toggle('dark', e.target.checked);
    localStorage.setItem(KEY_THEME, e.target.checked ? 'dark' : 'light');
  });

  // ── localStorage → Firestore 마이그레이션 ────────────
  async function migrateIfNeeded() {
    const localTodos = JSON.parse(localStorage.getItem('todo-app-data') || '[]');
    if (!localTodos.length) return;
    const snap = await getDocs(todosCol);
    if (!snap.empty) { localStorage.removeItem('todo-app-data'); localStorage.removeItem('todo-app-groups'); return; }
    const localGroups = JSON.parse(localStorage.getItem('todo-app-groups') || '[]');
    const batch = writeBatch(db);
    localTodos.forEach(t => batch.set(doc(db, 'todos', t.id), {
      text: t.text, category: t.category, groupId: t.groupId || 'default',
      done: t.done, createdAt: t.createdAt
    }));
    localGroups.filter(g => g.id !== 'default').forEach(g =>
      batch.set(doc(db, 'groups', g.id), { name: g.name, createdAt: new Date().toISOString() })
    );
    await batch.commit();
    localStorage.removeItem('todo-app-data');
    localStorage.removeItem('todo-app-groups');
  }

  // ── Firestore 실시간 리스너 ───────────────────────────
  function initListeners() {
    onSnapshot(todosCol, snap => {
      todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!isEditing) scheduleRender();
    });
    onSnapshot(groupsCol, snap => {
      const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!loaded.find(g => g.id === 'default'))
        setDoc(doc(db, 'groups', 'default'), { name: '기본', createdAt: '0' });
      groups = [
        ...loaded.filter(g => g.id === 'default'),
        ...loaded.filter(g => g.id !== 'default').sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''))
      ];
      if (!isEditing) scheduleRender();
    });
  }

  // ── 렌더링 ───────────────────────────────────────────
  function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderAll, 60);
  }

  function renderAll() {
    cleanupTrash();
    renderGroups();
    renderDashboard();
    renderTabs();
    renderActions();
    renderList();
    renderTrash();
    renderCalendar();
    renderCalPanel();
  }

  /* 그룹 바 */
  function renderGroups() {
    const bar = document.getElementById('groups-bar');
    bar.innerHTML = '';

    groups.forEach(g => {
      const pill = document.createElement('button');
      pill.className = 'group-pill' + (g.id === currentGroup ? ' active' : '');
      pill.dataset.id = g.id;
      if (g.id === 'default') {
        pill.textContent = g.name;
      } else {
        pill.innerHTML =
          `${escapeHtml(g.name)} <button class="pill-del" data-gid="${g.id}" title="그룹 삭제">×</button>`;
      }
      bar.appendChild(pill);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'group-add-btn';
    addBtn.textContent = '＋ 그룹 추가';
    addBtn.addEventListener('click', () => {
      addBtn.style.display = 'none';
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'group-new-input';
      inp.placeholder = '그룹 이름...'; inp.maxLength = 20;
      bar.insertBefore(inp, addBtn);
      inp.focus();

      let done = false;
      function commit() {
        if (done) return; done = true;
        const name = inp.value.trim();
        if (name) {
          const id = crypto.randomUUID();
          setDoc(doc(db, 'groups', id), { name, createdAt: new Date().toISOString() });
        }
        renderGroups();
      }
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { done = true; renderGroups(); }
      });
      inp.addEventListener('blur', commit, { once: true });
    });
    bar.appendChild(addBtn);
  }

  /* 그룹 클릭 위임 */
  document.getElementById('groups-bar').addEventListener('click', e => {
    const del = e.target.closest('.pill-del');
    if (del) {
      e.stopPropagation();
      const gid = del.dataset.gid;
      const grp = groups.find(g => g.id === gid);
      if (!grp) return;
      if (!confirm(`"${grp.name}" 그룹을 삭제할까요?\n해당 그룹의 할 일은 기본으로 이동됩니다.`)) return;
      if (currentGroup === gid) currentGroup = 'default';
      const batch = writeBatch(db);
      todos.filter(t => t.groupId === gid).forEach(t =>
        batch.update(doc(db, 'todos', t.id), { groupId: 'default' })
      );
      batch.delete(doc(db, 'groups', gid));
      batch.commit();
      return;
    }
    const pill = e.target.closest('.group-pill');
    if (pill) { currentGroup = pill.dataset.id; renderAll(); }
  });

  /* 대시보드 */
  function renderDashboard() {
    const todayStr = new Date().toDateString();
    const scope    = todos.filter(t => t.groupId === currentGroup && !t.deletedAt);
    const todayN   = scope.filter(t => t.createdAt && new Date(t.createdAt).toDateString() === todayStr).length;
    const total    = scope.length;
    const done     = scope.filter(t => t.done).length;
    const pct      = total === 0 ? 0 : Math.round((done / total) * 100);
    const stats    = { work:{t:0,d:0}, personal:{t:0,d:0}, study:{t:0,d:0} };
    scope.forEach(t => { stats[t.category].t++; if (t.done) stats[t.category].d++; });

    document.getElementById('today-count').textContent = todayN;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('overall-stat').innerHTML = `<strong>${done}/${total}</strong> 완료 (${pct}%)`;
    ['work','personal','study'].forEach(cat => {
      const {t, d} = stats[cat];
      document.getElementById(`bar-${cat}`).style.width = (t ? Math.round(d/t*100) : 0) + '%';
      document.getElementById(`stat-${cat}`).innerHTML = `<strong>${d}/${t}</strong>`;
    });
  }

  /* 탭 뱃지 */
  function renderTabs() {
    const q     = searchQuery.trim().toLowerCase();
    const scope = todos.filter(t => t.groupId === currentGroup && !t.deletedAt && (!q || t.text.toLowerCase().includes(q)));
    const counts = { all:0, work:0, personal:0, study:0 };
    scope.forEach(t => { if (!t.done) { counts.all++; counts[t.category]++; } });
    document.getElementById('badge-all').textContent      = counts.all;
    document.getElementById('badge-work').textContent     = counts.work;
    document.getElementById('badge-personal').textContent = counts.personal;
    document.getElementById('badge-study').textContent    = counts.study;
  }

  /* 액션 바 */
  function renderActions() {
    const scope     = todos.filter(t => t.groupId === currentGroup && !t.deletedAt);
    const remaining = scope.filter(t => !t.done).length;
    const completed = scope.filter(t => t.done).length;
    document.getElementById('remaining-count').innerHTML = `남은 할 일 <strong>${remaining}</strong>개`;
    const btn = document.getElementById('clear-btn');
    btn.disabled    = completed === 0;
    btn.textContent = completed > 0 ? `완료 항목 삭제 (${completed})` : '완료 항목 삭제';
  }

  /* 목록 */
  function getFiltered() {
    const q = searchQuery.trim().toLowerCase();
    let list = todos.filter(t => t.groupId === currentGroup && !t.deletedAt);
    if (currentCat !== 'all') list = list.filter(t => t.category === currentCat);
    if (q) list = list.filter(t => t.text.toLowerCase().includes(q));

    const CAT_ORDER = { work: 0, personal: 1, study: 2 };
    switch (currentSort) {
      case 'createdAt-asc':
        list.sort((a, b) => (a.createdAt||'').localeCompare(b.createdAt||''));
        list.sort((a, b) => a.done - b.done);
        break;
      case 'category':
        list.sort((a, b) => (CAT_ORDER[a.category]||0) - (CAT_ORDER[b.category]||0));
        list.sort((a, b) => a.done - b.done);
        break;
      case 'done':
        list.sort((a, b) => a.done - b.done ||
          (b.createdAt||'').localeCompare(a.createdAt||''));
        break;
      case 'manual':
        list.sort((a, b) => {
          const ai = manualOrder.indexOf(a.id), bi = manualOrder.indexOf(b.id);
          if (ai === -1 && bi === -1) return (b.createdAt||'').localeCompare(a.createdAt||'');
          if (ai === -1) return 1;
          if (bi === -1) return -1;
          return ai - bi;
        });
        break;
      default: // createdAt-desc
        list.sort((a, b) => (b.createdAt||'').localeCompare(a.createdAt||''));
        list.sort((a, b) => a.done - b.done);
    }

    // 오늘 마감 항목 맨 위로 (미완료만)
    const dueToday = list.filter(t => !t.done && t.dueDate === todayYMD);
    const rest     = list.filter(t => t.done || t.dueDate !== todayYMD);
    return [...dueToday, ...rest];
  }

  function renderList() {
    const ul       = document.getElementById('todo-list');
    const filtered = getFiltered();

    if (filtered.length === 0) {
      const grpName = (groups.find(g => g.id === currentGroup) || DEFAULT_GROUP).name;
      const msg = searchQuery
        ? `"${escapeHtml(searchQuery)}" 검색 결과가 없어요.`
        : `${escapeHtml(grpName)} 그룹에 할 일이 없어요!`;
      ul.innerHTML = `<li class="empty-state"><span class="empty-icon">🎉</span>${msg}</li>`;
      return;
    }

    const frag = document.createDocumentFragment();
    filtered.forEach(todo => {
      const li = document.createElement('li');
      const isDueToday = !todo.done && todo.dueDate === todayYMD;
      li.className = 'todo-item' + (todo.done ? ' done' : '') + (isDueToday ? ' due-today' : '');
      li.dataset.id = todo.id;
      li.draggable = true;

      let dateBadge = '';
      if (todo.dueDate) {
        if (isDueToday) {
          dateBadge = `<span class="due-today-badge">📅 오늘</span>`;
        } else if (!todo.done && todo.dueDate < todayYMD) {
          dateBadge = `<span class="due-date-badge overdue">⚠️ ${formatDueDate(todo.dueDate)}</span>`;
        } else {
          dateBadge = `<span class="due-date-badge">${formatDueDate(todo.dueDate)}</span>`;
        }
      }

      li.innerHTML = `
        <div class="todo-row">
          <span class="sort-handle" title="드래그로 순서 변경">⠿</span>
          <div class="todo-check" data-id="${todo.id}" title="완료 토글">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1 5L5 9L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="cat-badge ${todo.category}">${CAT_LABEL[todo.category]}</span>
          <div class="todo-content">
            <span class="todo-text" data-id="${todo.id}" title="더블클릭으로 수정">${escapeHtml(todo.text)}</span>
            <span class="todo-time">${timeAgo(todo.createdAt)}</span>
          </div>
          ${dateBadge}
          <button class="memo-btn${todo.memo ? ' has-memo' : ''}${todo.id === openMemoId ? ' memo-open' : ''}" data-id="${todo.id}">메모</button>
          <button class="todo-delete" data-id="${todo.id}" title="삭제">×</button>
        </div>
        <div class="memo-panel${todo.id === openMemoId ? ' open' : ''}">
          <textarea class="memo-textarea" data-id="${todo.id}" placeholder="메모를 입력하세요...">${escapeHtml(todo.memo || '')}</textarea>
          <button class="memo-close-btn" data-id="${todo.id}" title="닫기">×</button>
        </div>
      `;

      li.addEventListener('dragstart', e => {
        if (e.target.closest('.sort-handle')) return;
        draggedTodoId = todo.id;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', todo.id);
        setTimeout(() => li.classList.add('dragging'), 0);
      });
      li.addEventListener('dragend', () => {
        li.classList.remove('dragging');
        draggedTodoId = null;
      });

      frag.appendChild(li);
    });
    ul.replaceChildren(frag);

    // 수동 정렬 모드
    ul.classList.toggle('manual-sort', currentSort === 'manual');
    if (sortableInst) { sortableInst.destroy(); sortableInst = null; }
    if (currentSort === 'manual') {
      sortableInst = new Sortable(ul, {
        handle: '.sort-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd() {
          manualOrder = [...ul.querySelectorAll('.todo-item')].map(li => li.dataset.id);
          localStorage.setItem(ORDER_KEY, JSON.stringify(manualOrder));
        }
      });
    }
  }

    const input = document.getElementById('todo-input');
    const text  = input.value.trim();

      input.style.borderColor = 'var(--delete-color)';
      setTimeout(() => { input.style.borderColor = ''; }, 600);

    input.value = '';
    document.getElementById('date-input').value = '';

  function detectCategory(text) {
    const lower = text.toLowerCase();
    for (const [cat, keywords] of Object.entries(AUTO_CAT)) {
      if (keywords.some(kw => lower.includes(kw))) return cat;
    }
    return null;
  }

  // ── 휴지통 ───────────────────────────────────────────
  function cleanupTrash() {
    const cutoff = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
    todos
      .filter(t => t.deletedAt && t.deletedAt < cutoff)
      .forEach(t => deleteDoc(doc(db, 'todos', t.id)));
  }

  function trashTimeLabel(deletedAt) {
    const remaining = 24 * 60 * 60 * 1000 - (Date.now() - new Date(deletedAt).getTime());
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    if (h > 0) return `${h}시간 후 삭제`;
    if (m > 0) return `${m}분 후 삭제`;
    return '곧 삭제';
  }

  function renderTrash() {
    const trashed = todos.filter(t => t.deletedAt).sort((a, b) => b.deletedAt.localeCompare(a.deletedAt));
    const badge   = document.getElementById('trash-badge');
    const btn     = document.getElementById('trash-btn');
    const panel   = document.getElementById('trash-panel');

    badge.textContent = trashed.length;
    btn.classList.toggle('has-items', trashed.length > 0);
    btn.classList.toggle('open', showTrash);

    if (!showTrash) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';

    if (trashed.length === 0) {
      panel.innerHTML = '<p class="trash-empty-msg">🗑️ 휴지통이 비어있습니다</p>';
      return;
    }

    panel.innerHTML = `
      <div class="trash-panel-header">
        <span class="trash-panel-title">🗑️ 휴지통 (${trashed.length}개 · 24시간 후 자동 삭제)</span>
        <button class="trash-empty-all-btn">전체 영구삭제</button>

  // ── 내보내기 / 가져오기 ───────────────────────────────
  function exportData() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      todos:  todos.filter(t => !t.deletedAt).map(t => ({
        id: t.id, text: t.text, category: t.category,
        groupId: t.groupId, done: t.done,
        createdAt: t.createdAt, memo: t.memo || ''
      })),
      groups: groups.map(g => ({ id: g.id, name: g.name, createdAt: g.createdAt }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `todos-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  document.getElementById('export-btn').addEventListener('click', exportData);

  document.getElementById('import-file').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';

    let data;
    try {
      data = JSON.parse(await file.text());
      if (!Array.isArray(data.todos)) throw new Error();
    } catch {
      alert('올바른 JSON 파일이 아닙니다.'); return;
    }

    const backupFirst = confirm(
      `가져오기 전에 현재 데이터를 백업하시겠습니까?\n(확인 → 백업 후 가져오기 / 취소 → 바로 가져오기)`
    );
    if (backupFirst) exportData();

    if (!confirm(`총 ${data.todos.length}개 항목을 가져올까요?\n현재 데이터는 모두 교체됩니다.`)) return;

    const batch = writeBatch(db);
    todos.forEach(t => batch.delete(doc(db, 'todos', t.id)));
    groups.filter(g => g.id !== 'default').forEach(g => batch.delete(doc(db, 'groups', g.id)));

    (data.groups || []).filter(g => g.id !== 'default').forEach(g =>
      batch.set(doc(db, 'groups', g.id), { name: g.name, createdAt: g.createdAt || new Date().toISOString() })
    );
    data.todos.forEach(t => {
      const id = t.id || crypto.randomUUID();
      batch.set(doc(db, 'todos', id), {
        text: t.text || '', category: t.category || 'personal',
        groupId: t.groupId || 'default', done: t.done || false,
        createdAt: t.createdAt || new Date().toISOString(),
        memo: t.memo || ''
      });
    });
    await batch.commit();
    alert('가져오기 완료!');
  });

    const li   = span.closest('.todo-item');

    if (!todo) return;

    const origText = todo.text;

    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'todo-edit-input';
    inp.value = todo.text; inp.maxLength = 100;

    const catSel = document.createElement('select');

    [['work','💼 업무'],['personal','🏠 개인'],['study','📚 공부']].forEach(([v, label]) => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = label;

    const badge = li.querySelector('.cat-badge');

    const content = li.querySelector('.todo-content');
    content.innerHTML = '';
    content.appendChild(inp);
    content.appendChild(catSel);
    inp.focus(); inp.select();

    function commit() {
      isEditing = false;
      const newText = inp.value.trim();
      updateDoc(doc(db, 'todos', todo.id), {
        text:     newText || todo.text,
        category: catSel.value
      });
      renderAll();
    }
    function cancel() { isEditing = false; renderAll(); }

    let blurTimer = null;
    const onBlur  = () => { blurTimer = setTimeout(commit, 120); };
    const onFocus = () => clearTimeout(blurTimer);
    isEditing = true;
    inp.addEventListener('blur',  onBlur);   catSel.addEventListener('blur',  onBlur);
    inp.addEventListener('focus', onFocus);  catSel.addEventListener('focus', onFocus);

    const onKey = e => {
      if (e.key === 'Enter')  { e.preventDefault(); clearTimeout(blurTimer); commit(); }
      if (e.key === 'Escape') { e.preventDefault(); clearTimeout(blurTimer); cancel(); }
    };
    inp.addEventListener('keydown', onKey);
    catSel.addEventListener('keydown', onKey);

  // ── 유틸 ─────────────────────────────────────────────
  function timeAgo(iso) {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60)    return '방금 전';
    if (diff < 3600)  return `${Math.floor(diff / 60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
    const d = new Date(iso);
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDueDate(dateStr) {
    if (!dateStr) return '';
    const [, m, d] = dateStr.split('-');
    return `${Number(m)}/${Number(d)}`;
  }

  function fmtYMD(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function detectDate(text) {
    const now    = new Date();
    const todDow = now.getDay(); // 0=일, 1=월 ... 6=토
    const DOW_KO = { '일':0, '월':1, '화':2, '수':3, '목':4, '금':5, '토':6 };
    const KO_NUM = { '한':1, '두':2, '세':3, '네':4, '다섯':5, '여섯':6 };

    const addDays   = n => { const d = new Date(now); d.setDate(d.getDate()+n); return fmtYMD(d); };
    const addMonths = n => { const d = new Date(now); d.setMonth(d.getMonth()+n); return fmtYMD(d); };
    // 오늘 기준으로 해당 요일까지 최소 1일, 최대 7일
    const daysUntil = dow => ((dow - todDow + 7) % 7) || 7;
    // 다음주 특정 요일 (다음주 월요일부터 계산)
    const nextWeekDate = dow => {
      const toMon = ((1 - todDow + 7) % 7) || 7; // 다음 월요일까지 일수
      const offset = dow === 0 ? 6 : dow - 1;     // 월=0, 화=1 ... 일=6
      return addDays(toMon + offset);
    };

    if (/오늘/.test(text)) return todayYMD;
    if (/내일/.test(text)) return addDays(1);
    if (/모레/.test(text)) return addDays(2);

    // 다음 주말 (주말 앞에 체크)
    if (/다음\s*주말/.test(text)) return nextWeekDate(6);
    // 이번 주말 / 주말
    if (/주말/.test(text)) return addDays(daysUntil(6));

    // 다음주 + 요일 (예: 다음주 금요일, 다음 월요일)
    let m = text.match(/다음\s*주?\s*([월화수목금토일])요일?/);
    if (m) return nextWeekDate(DOW_KO[m[1]]);

    // 이번주 + 요일 / 요일만 (예: 이번주 수요일, 금요일)
    m = text.match(/(?:이번\s*주?\s*)?([월화수목금토일])요일/);
    if (m) return addDays(daysUntil(DOW_KO[m[1]]));

    // 다음주 (요일 미지정 → 다음 월요일)
    if (/다음\s*주/.test(text)) return nextWeekDate(1);

    // 다음달 N일
    m = text.match(/다음\s*달\s*(\d{1,2})일/);
    if (m) { const d = new Date(now); d.setMonth(d.getMonth()+1, Number(m[1])); return fmtYMD(d); }
    // 다음달
    if (/다음\s*달/.test(text)) return addMonths(1);

    // N주 후/뒤 (예: 2주 후, 한주 뒤)
    m = text.match(/(\d+|한|두|세|네)\s*주\s*(?:후|뒤)/);
    if (m) return addDays((KO_NUM[m[1]] ?? Number(m[1])) * 7);

    // N달/개월 후/뒤 (예: 한달 뒤, 2개월 후)
    m = text.match(/(\d+|한|두|세|네)\s*(?:달|개월)\s*(?:후|뒤)/);
    if (m) return addMonths(KO_NUM[m[1]] ?? Number(m[1]));

    // N일 후/뒤
    m = text.match(/(\d+)\s*일\s*(?:후|뒤)/);
    if (m) return addDays(Number(m[1]));

    // N월 N일
    m = text.match(/(\d{1,2})월\s*(\d{1,2})일/);
    if (m) {
      const mo = String(m[1]).padStart(2,'0'), dy = String(m[2]).padStart(2,'0');
      const y  = now.getFullYear();
      const s  = `${y}-${mo}-${dy}`;
      return s < todayYMD ? `${y+1}-${mo}-${dy}` : s;
    }

    return null;
  }

  // ── 달력 렌더링 ───────────────────────────────────────
  function renderCalendar() {
    const titleEl = document.getElementById('cal-title');
    const gridEl  = document.getElementById('cal-grid');
    if (!titleEl || !gridEl) return;

    titleEl.textContent = `${calYear}년 ${calMonth + 1}월`;

    const frag = document.createDocumentFragment();
    ['일','월','화','수','목','금','토'].forEach(dow => {
      const cell = document.createElement('div');
      cell.className = 'cal-dow';
      cell.textContent = dow;
      frag.appendChild(cell);
    });

    const firstDow    = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

    const todosByDate = {};
    todos.filter(t => t.dueDate && !t.deletedAt).forEach(t => {
      (todosByDate[t.dueDate] ||= []).push(t);
    });

    for (let i = 0; i < firstDow; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day empty';
      frag.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const mm      = String(calMonth + 1).padStart(2, '0');
      const dd      = String(d).padStart(2, '0');
      const dateStr = `${calYear}-${mm}-${dd}`;
      const dow     = new Date(calYear, calMonth, d).getDay();
      const dayTodos = todosByDate[dateStr] || [];
      const isToday  = dateStr === todayYMD;
      const isSel    = dateStr === selectedCalDate;

      const cell = document.createElement('div');
      let cls = 'cal-day';
      if (isToday)   cls += ' today';
      if (isSel)     cls += ' selected';
      if (dow === 0) cls += ' sun';
      if (dow === 6) cls += ' sat';
      cell.className    = cls;
      cell.dataset.date = dateStr;

      const numEl = document.createElement('div');
      numEl.className = 'cal-day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (dayTodos.length) {
        const dotsEl = document.createElement('div');
        dotsEl.className = 'cal-dots';
        dayTodos.slice(0, 5).forEach(t => {
          const dot = document.createElement('div');
          dot.className = `cal-dot ${t.category}`;
          dotsEl.appendChild(dot);
        });
        cell.appendChild(dotsEl);
      }

      cell.addEventListener('dragover', e => {
        if (!draggedTodoId) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        cell.classList.add('drop-target');
      });
      cell.addEventListener('dragleave', e => {
        if (!cell.contains(e.relatedTarget)) cell.classList.remove('drop-target');
      });
      cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drop-target');
        if (draggedTodoId) {
          updateDoc(doc(db, 'todos', draggedTodoId), { dueDate: dateStr });
          draggedTodoId = null;
        }
      });
      cell.addEventListener('click', () => {
        selectedCalDate = selectedCalDate === dateStr ? null : dateStr;
        renderCalendar();
        renderCalPanel();
      });

      frag.appendChild(cell);
    }

    gridEl.replaceChildren(frag);
  }

  function renderCalPanel() {
    const panel = document.getElementById('cal-panel');
    if (!panel) return;
    if (!selectedCalDate) { panel.style.display = 'none'; return; }

    const [, m, d] = selectedCalDate.split('-').map(Number);
    const dayTodos = todos.filter(t => t.dueDate === selectedCalDate && !t.deletedAt);
    panel.style.display = 'block';

    const title = document.createElement('div');
    title.className = 'cal-selected-title';
    title.textContent = `${m}월 ${d}일 일정 (${dayTodos.length}개)`;
    panel.replaceChildren(title);

    if (!dayTodos.length) {
      const empty = document.createElement('div');
      empty.className = 'cal-empty-day';
      empty.textContent = '이 날 일정이 없어요';
      panel.appendChild(empty);
      return;
    }

    dayTodos.forEach(t => {
      const item = document.createElement('div');
      item.className = 'cal-todo-item';
      item.draggable = true;
      item.innerHTML = `
        <span class="cat-badge ${t.category}">${CAT_LABEL[t.category]}</span>
        <span class="${t.done ? 'cal-todo-done-text' : ''}" style="flex:1;font-size:0.9rem">${escapeHtml(t.text)}</span>
        <span style="font-size:0.7rem;color:var(--text-muted);margin-left:4px" title="다른 날로 드래그해서 이동">⠿</span>
      `;
      item.addEventListener('dragstart', e => {
        draggedTodoId = t.id;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', t.id);
        setTimeout(() => item.classList.add('dragging'), 0);
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        draggedTodoId = null;
      });
      panel.appendChild(item);
    });
  }

  function setDateDisplay() {
    const d = new Date();
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('date-display').textContent =
      `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}요일)`;
  }

  // ── 달력 네비게이션 ───────────────────────────────────
  document.getElementById('cal-prev').addEventListener('click', () => {
    if (--calMonth < 0) { calMonth = 11; calYear--; }
    selectedCalDate = null;
    renderCalendar();
    renderCalPanel();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    if (++calMonth > 11) { calMonth = 0; calYear++; }
    selectedCalDate = null;
    renderCalendar();
    renderCalPanel();
  });

  // ── 초기화 ───────────────────────────────────────────
  setDateDisplay();
  await migrateIfNeeded();
  initListeners();
</script>
</body>
</html>
